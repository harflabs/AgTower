# AgTower tmux config — shipped as a bundled resource inside the .app.
# Every tmux invocation passes this file via `tmux -f`.

source-file -q ~/.tmux.conf

# Click to select pane, drag borders to resize, mouse wheel for scrollback.
set -g mouse on

# 24-bit colour so Claude Code / Codex TUIs render their full palette.
set -g  default-terminal "xterm-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Forward modified key sequences (Shift+Enter, etc.) to inner applications
# using the CSI u (kitty keyboard protocol) encoding.
#
# `extended-keys always` — unconditionally forwards CSI u sequences to ALL
# panes, even those that don't request the kitty protocol via the activation
# sequence (\x1b[>1u). Claude Code doesn't send the activation sequence, so
# the default "on" mode silently drops the sequences.
#
# `terminal-features extkeys` — tells tmux that the outer terminal (xterm.js
# via AgTower) sends extended key sequences, so tmux should parse CSI u
# input from the outer side. Uses xterm* glob to match any xterm variant.
set -g extended-keys always
set -as terminal-features 'xterm*:extkeys'

# Hide tmux's own status bar — AgTower's sidebar already shows session info,
# and the status bar's periodic redraws (clock, CPU meter, etc.) would
# defeat silence-based idle detection.
set -g status off

# Guarantee that terminal bells (BEL / \x07) pass through tmux to the outer
# PTY so AgTower's attention-detection scanner sees them. Codex uses BEL as
# its sole NeedsAttention signal — if tmux eats it, Codex sessions skip
# NeedsAttention and go straight from Running to Idle.
set -g bell-action any
set -g visual-bell off

# Increase scrollback depth so users can actually scroll back meaningfully.
# 50k lines ≈ a few MB of text per pane — acceptable for a GUI desktop app.
set -g history-limit 50000

# Natural mouse-wheel scrolling.
#
# The problem: `set -g mouse on` makes scrolling up enter tmux copy mode,
# which lets you browse scrollback — but the user has no visible indication
# they're "in a mode" and normal typing stops working until they press `q`.
#
# The fix below binds wheel events at the root level so that:
#   1. In a main-screen pane (Claude Code), scrolling up enters copy mode
#      with the `-e` flag, which automatically exits when the user scrolls
#      back to the bottom. No manual `q` required — scroll-up-scroll-down
#      feels continuous and gesture-natural.
#   2. In an alt-screen pane (Codex TUI and similar), the raw mouse event
#      is forwarded so the program inside can implement its own scroll
#      handling if it wants to.
#   3. If the user is already in any tmux mode, we just forward the wheel
#      so copy-mode's native scroll bindings take over.
bind-key -T root WheelUpPane   if-shell -F -t = "#{?pane_in_mode,1,#{alternate_on}}" "send-keys -M" "copy-mode -e; send-keys -M"
bind-key -T root WheelDownPane if-shell -F -t = "#{?pane_in_mode,1,#{alternate_on}}" "send-keys -M" "send-keys -M"
