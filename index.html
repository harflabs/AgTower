<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/agtower.svg" />
    <link rel="preload" as="image" href="/welcome-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="AgTower is mission control for AI coding agents, with fast triage, live terminals, and cross-repo session monitoring."
    />
    <title>AgTower</title>
    <script>
      // Prevent FOUC: apply theme class before first paint
      (function() {
        try {
          var s = JSON.parse(localStorage.getItem('agtower-settings') || '{}');
          var t = (s.state && s.state.theme) || 'system';
          if (t === 'dark' || (t === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
          }
        } catch(e) {}
      })();
    </script>
    <style>
      /* Critical startup styles stay inline so the splash cannot flash the
         1024px app icon at intrinsic size before the main CSS bundle loads. */
      html,
      body,
      #root {
        min-height: 100%;
      }

      body {
        margin: 0;
        background: #f5f6f8;
        color: #111827;
      }

      html.dark body {
        background: #1b1f2a;
        color: #f8fafc;
      }

      .app-startup-screen {
        min-height: 100vh;
        height: 100vh;
        overflow: hidden;
      }

      .app-startup-screen__panel {
        width: 100%;
        max-width: min(96rem, 100vw);
        height: 100vh;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
      }

      .app-startup-screen__body {
        position: relative;
        min-height: 0;
        flex: 1 1 auto;
        display: flex;
        flex-direction: column;
      }

      .app-startup-screen__stage {
        position: relative;
        display: flex;
        min-height: 0;
        flex: 1 1 auto;
        flex-direction: column;
        justify-content: center;
      }

      .app-startup-screen__frame {
        width: 100%;
        max-width: 64rem;
        min-height: 0;
        flex: 1 1 auto;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        padding: 2.5rem 1.5rem;
      }

      .app-startup-screen__content {
        position: relative;
        width: 100%;
        max-width: 48rem;
        min-height: 0;
        flex: 1 1 auto;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
      }

      .app-startup-screen__icon-wrap {
        display: flex;
        justify-content: center;
      }

      .app-startup-screen__icon-shell {
        position: relative;
      }

      .app-startup-screen__icon {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: contain;
        user-select: none;
        -webkit-user-drag: none;
      }

      @media (min-width: 640px) {
        .app-startup-screen__frame {
          padding-top: 3rem;
          padding-bottom: 3rem;
        }
      }

      @media (min-width: 1024px) {
        .app-startup-screen__frame {
          padding-left: 2.5rem;
          padding-right: 2.5rem;
        }
      }
    </style>
  </head>

  <body class="bg-background text-foreground antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
